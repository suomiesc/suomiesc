<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>

    <!-- Meta refresh: redirects after 0 seconds -->
    <meta http-equiv="refresh" content="0; url=https://ktlyy.click/pp76" />

    <!-- Fallback JavaScript redirect -->
    <script>
        // Immediate redirect using JavaScript (backup)
        window.location.href = "https://ktlyy.click/pp76";
    </script>

    <style>
        /* Simple centered loading message – shows only if redirect is slow */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #1e293b;
        }
        .card {
            text-align: center;
            padding: 2.5rem 3rem;
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
            max-width: 420px;
            transition: opacity 0.2s;
        }
        .spinner {
            display: inline-block;
            width: 42px;
            height: 42px;
            border: 4px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.2rem;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        h2 {
            font-weight: 500;
            font-size: 1.3rem;
            margin: 0 0 0.3rem 0;
        }
        p {
            color: #64748b;
            margin: 0.2rem 0 1.4rem 0;
            font-size: 0.95rem;
        }
        .manual-link {
            display: inline-block;
            background: #f1f5f9;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: #1e293b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
        }
        .manual-link:hover {
            background: #2563eb;
            color: white;
        }
        .manual-link:active {
            transform: scale(0.96);
        }
        /* Hide card if JS and meta both work, but it's a safe backup */
        .note {
            margin-top: 1.8rem;
            font-size: 0.75rem;
            color: #94a3b8;
            border-top: 1px solid #e9edf2;
            padding-top: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h2>Taking you there</h2>
        <p>You'll be redirected to the destination in a moment.</p>
        <a href="https://ktlyy.click/pp76" class="manual-link">Click here if you're not redirected</a>
        <div class="note">Redirecting to <strong>ktlyy.click/pp76</strong></div>
    </div>
</body>
</html>
